_target_: kirby.models.CaPOYO
dim: 1024
dim_head: 1024
patch_size: 1
num_latents: 16
depth: 6
cross_heads: 2
self_heads: 8
ffn_dropout: 0.2
lin_dropout: 0.4
atn_dropout: 0.2
use_cre_line_embedding: False
use_depth_embedding: False
use_spatial_embedding: False
use_roi_feat_embedding: False
use_session_embedding: True
use_unit_embedding: True
use_cre_loss: False
use_cre_data: True
use_random_masking_loss: False
random_masking_loss_option : 'dim'
masking_rate : 0.5
no_decoding : False # true if you just want to train former two layers (cross attention and self attention)
unet_type : half_unet
task : movie_decoding_one
output_activation : clamp    # sigmoid | clamp | tanh
range_loss_weight : 0.01     # 0 disables range loss
